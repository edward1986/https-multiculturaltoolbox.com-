{{ define "main" }}
<article class="announcement-single" style="padding: 60px 0;">
    <div class="container" style="max-width: 800px;">
        <header style="border-bottom: 2px solid #eee; padding-bottom: 30px; margin-bottom: 40px; background: none; position: static; box-shadow: none;">
            <div style="margin-bottom: 15px;">
                <span style="font-size: 0.9rem; color: #666;">Published on {{ .Date.Format "January 2, 2006" }}</span>
                {{ if .Params.important }}
                <span class="status-badge status-evaluation" style="margin-left: 10px;">IMPORTANT ADVISORY</span>
                {{ end }}
            </div>
            <h1 style="color: var(--primary-color); font-size: 2.2rem; line-height: 1.2;">{{ .Title }}</h1>
        </header>

        <div class="content" style="font-size: 1.1rem; line-height: 1.8;">
            {{ .Content }}
        </div>

        <div style="margin-top: 60px; border-top: 1px solid #eee; padding-top: 30px;">
            <a href="/announcements" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color);">&larr; Back to Announcements</a>
        </div>
    </div>
</article>
{{ end }}
