{{ define "main" }}
<article class="announcement-single">
    <div class="container max-w-800">
        <header class="announcement-single-header-block">
            <div class="announcement-single-meta-block">
                <span class="announcement-single-date-text">Published on {{ .Date.Format "January 2, 2006" }}</span>
                {{ if .Params.important }}
                <span class="status-badge status-evaluation" style="margin-left: 10px;">IMPORTANT ADVISORY</span>
                {{ end }}
            </div>
            <h1 class="announcement-single-title-text">{{ .Title }}</h1>
        </header>

        <div class="announcement-single-content-body content">
            {{ .Content }}
        </div>

        <div class="announcement-single-back-link">
            <a href="/announcements" class="btn btn-outline-primary">&larr; Back to Announcements</a>
        </div>
    </div>
</article>
{{ end }}
