{{ define "main" }}
<div class="container">
  <header class="page-header">
    <h1>{{ .Title }}</h1>
  </header>
  <div class="post-list">
    {{ range .Pages }}
    <article class="post-item">
      <h2><a href="{{ .Permalink }}">{{ .Title }}</a></h2>
      <div class="post-meta">
        <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "January 2, 2006" }}</time>
      </div>
      <p>{{ .Summary }}</p>
      <a href="{{ .Permalink }}" class="read-more">Read more &rarr;</a>
    </article>
    {{ end }}
  </div>
</div>
{{ end }}
