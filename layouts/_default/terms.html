{{ define "main" }}
<div class="container section-padding">
    <h1 class="section-title">{{ .Title }}</h1>
    <ul>
        {{ range .Data.Terms.ByCount }}
            <li><a href="{{ .Page.RelPermalink | relURL }}">{{ .Page.Title }}</a> ({{ .Count }})</li>
        {{ end }}
    </ul>
</div>
{{ end }}
