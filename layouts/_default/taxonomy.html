{{ define "main" }}
<div class="container section-padding">
    <h1 class="section-title">{{ .Title }}</h1>
    <div class="grid">
        {{ range .Pages }}
            {{ if eq .Section "services" }}
                {{ partial "service-card.html" . }}
            {{ else }}
                <div class="card">
                    <h3><a href="{{ .RelPermalink | relURL }}">{{ .Title }}</a></h3>
                    <p>{{ .Summary }}</p>
                </div>
            {{ end }}
        {{ end }}
    </div>
</div>
{{ end }}
