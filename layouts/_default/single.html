{{ define "main" }}
<section class="page-single section-padding-sm">
    <div class="container max-w-900">
        <header class="page-header-block">
            <h1 class="section-title">{{ .Title }}</h1>
            {{ if .Description }}
            <p class="lead page-description">{{ .Description }}</p>
            {{ end }}
        </header>

        <div class="content-box content">
            {{ .Content }}
        </div>

        <div class="mt-40 text-center no-print">
            <a href="{{ "/" | relURL }}" class="btn btn-outline-primary">&larr; Return to Home</a>
        </div>
    </div>
</section>
{{ end }}
