<div class="card">
    <div class="card-header-meta">
        <span class="status-badge status-processing badge-sm">{{ .Params.category }}</span>
    </div>
    <h3>{{ .Title }}</h3>
    <p>{{ .Description | truncate 120 }}</p>
    <div class="card-actions">
        <a href="{{ .RelPermalink }}" class="btn btn-outline-primary btn-sm">Learn More</a>
        <a href="{{ "/apply" | relURL }}" class="btn btn-primary btn-sm">Apply Now</a>
    </div>
</div>
