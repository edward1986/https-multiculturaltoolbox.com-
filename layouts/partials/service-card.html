<div class="card">
    <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;">
        <span class="status-badge status-processing" style="font-size: 0.7rem;">{{ .Params.category }}</span>
    </div>
    <h3>{{ .Title }}</h3>
    <p>{{ .Description | truncate 120 }}</p>
    <div style="margin-top: 20px; display: flex; gap: 10px;">
        <a href="{{ .RelPermalink }}" class="btn btn-outline" style="color: var(--primary-color); border-color: var(--primary-color); padding: 8px 16px; font-size: 0.85rem;">Learn More</a>
        <a href="{{ "/apply" | relURL }}" class="btn btn-primary" style="padding: 8px 16px; font-size: 0.85rem;">Apply Now</a>
    </div>
</div>
