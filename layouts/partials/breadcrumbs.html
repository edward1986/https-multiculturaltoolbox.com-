<nav class="breadcrumb" aria-label="Breadcrumb">
    <div class="container">
        <a href="{{ "/" | relURL }}">Home</a>
        {{ $url := "" }}
        {{ range (split .RelPermalink "/") }}
            {{ if . }}
                {{ $url = printf "%s/%s" $url . }}
                <span>/</span>
                <a href="{{ $url | relURL }}">{{ humanize . }}</a>
            {{ end }}
        {{ end }}
    </div>
</nav>
