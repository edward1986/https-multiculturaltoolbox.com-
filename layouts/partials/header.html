<header class="site-header">
  <div class="container">
    <div class="site-branding">
      <a href="{{ "/" | relURL }}" class="site-title">{{ .Site.Title }}</a>
    </div>
    <nav class="site-navigation">
      <ul class="main-menu">
        {{ range .Site.Menus.main }}
        <li class="menu-item">
          <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        </li>
        {{ end }}
      </ul>
    </nav>
  </div>
</header>
